<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Lab Ciberseguridad</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        .emoji { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #58a6ff; margin-bottom: 0.5rem; }
        .subtitle { color: #8b949e; margin-bottom: 1.5rem; }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 1.5rem 0;
        }
        .info-item {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px;
            text-align: left;
        }
        .info-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        .info-value { font-family: monospace; font-size: 0.9rem; color: #e6edf3; word-break: break-word; }
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 1rem 0;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.online { background: #3fb950; box-shadow: 0 0 8px #3fb950; }
        .status-dot.offline { background: #f85149; box-shadow: 0 0 8px #f85149; }
        .disclaimer {
            background: #1c2129;
            border: 1px solid #f0883e;
            color: #f0883e;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🔬</div>
        <h1>Laboratorio Ético</h1>
        <p class="subtitle">Fingerprinting en entorno controlado</p>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">🌐 Tu IP</div>
                <div class="info-value" id="ipDisplay">Consultando...</div>
            </div>
            <div class="info-item">
                <div class="info-label">📱 Navegador</div>
                <div class="info-value" id="browserDisplay">...</div>
            </div>
            <div class="info-item">
                <div class="info-label">💻 Sistema</div>
                <div class="info-value" id="osDisplay">...</div>
            </div>
            <div class="info-item">
                <div class="info-label">🖥️ Resolución</div>
                <div class="info-value" id="screenDisplay">...</div>
            </div>
        </div>

        <div class="status-container">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>

        <div class="disclaimer">
            ⚠️ Laboratorio ÉTICO. Datos recolectados solo con fines educativos en entorno controlado.
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN: PON AQUÍ LA URL DE NGROK
        // ============================================
        const SERVIDOR_URL = 'https://1ee4-170-83-127-12.ngrok-free.app';  // ← CAMBIAR

        // ============================================
        // INDICADOR DE ESTADO DEL SERVIDOR
        // ============================================
        async function verificarEstadoServidor() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            try {
                const resp = await fetch(SERVIDOR_URL + '/health', { method: 'GET' });
                if (resp.ok) {
                    dot.className = 'status-dot online';
                    text.textContent = 'Servidor conectado';
                } else {
                    throw new Error('Respuesta no OK');
                }
            } catch (e) {
                dot.className = 'status-dot offline';
                text.textContent = 'Sin conexión al servidor';
            }
        }

        // Verificar cada 10 segundos
        setInterval(verificarEstadoServidor, 10000);
        // Verificar inmediatamente al cargar
        verificarEstadoServidor();

        // ============================================
        // RECOLECCIÓN DE DATOS
        // ============================================
        function recolectarDatos() {
            return {
                pantalla: {
                    ancho: screen.width,
                    alto: screen.height,
                    disponible: `${screen.availWidth}x${screen.availHeight}`,
                    profundidadColor: screen.colorDepth,
                    pixelRatio: window.devicePixelRatio || 1
                },
                userAgent: navigator.userAgent,
                plataforma: navigator.platform || 'Desconocida',
                idioma: navigator.language,
                idiomas: navigator.languages || [],
                cookiesHabilitadas: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack || 'no enviado',
                nucleosCPU: navigator.hardwareConcurrency || '?',
                memoriaRAM: navigator.deviceMemory || '?',
                puntosTactiles: navigator.maxTouchPoints || 0,
                conexion: navigator.connection ? {
                    tipo: navigator.connection.effectiveType,
                    downlink: navigator.connection.downlink,
                    rtt: navigator.connection.rtt
                } : null,
                zonaHoraria: Intl.DateTimeFormat().resolvedOptions().timeZone || '?',
                timestamp: new Date().toISOString(),
                canvasFingerprint: (() => {
                    try {
                        const c = document.createElement('canvas');
                        const ctx = c.getContext('2d');
                        c.width = 240; c.height = 60;
                        ctx.fillStyle = '#f60'; ctx.fillRect(20,10,100,40);
                        ctx.fillStyle = '#069'; ctx.font = 'bold 14px Arial';
                        ctx.fillText('Lab 🧪', 30, 35);
                        return c.toDataURL().length;
                    } catch(e) { return 0; }
                })()
            };
        }

        async function enviarDatos() {
            const datos = recolectarDatos();
            try {
                const resp = await fetch(SERVIDOR_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                const resultado = await resp.json();
                console.log('Respuesta del servidor:', resultado);
            } catch (e) {
                console.error('Error enviando datos:', e);
            }
        }

        // ============================================
        // MOSTRAR INFO LOCAL
        // ============================================
        function mostrarInfo() {
            document.getElementById('browserDisplay').textContent = navigator.userAgent.split(' ').slice(-2).join(' ') || '?';
            document.getElementById('osDisplay').textContent = navigator.platform || '?';
            document.getElementById('screenDisplay').textContent = `${screen.width}x${screen.height} @ ${window.devicePixelRatio}x`;
        }
        async function obtenerIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                document.getElementById('ipDisplay').textContent = d.ip;
            } catch(e) {
                document.getElementById('ipDisplay').textContent = 'No disponible';
            }
        }

        // ============================================
        // INICIO
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            mostrarInfo();
            obtenerIP();
            enviarDatos();
        });

        // Aviso si no se configuró la URL
        if (SERVIDOR_URL.includes('https://1ee4-170-83-127-12.ngrok-free.app')) {
            console.warn('⚠️ Configura SERVIDOR_URL con la URL de Ngrok.');
        }
    </script>
</body>
</html>
